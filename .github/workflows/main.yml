name: Pasbox 单一系统全自动交叉编译发布
on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:
env:
  REPO_NAME: ${{ github.repository }}
  WORKSPACE: ${{ github.workspace }}
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build:
    name: 统一交叉编译 (Ubuntu )
    runs-on: ubuntu-latest
    
    steps:
      - name: 检出代码
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: 安装 Lazarus 和 FPC
        uses: gcarreno/setup-lazarus@v3.2.17
        with:
          lazarus-version: stable
          with-cache: false
      - name: 安装交叉编译工具链和系统依赖
        run: |
          sudo apt-get update
          # 安装 Linux 原生编译依赖
          sudo apt-get install -y libgtk2.0-dev libssl-dev libcurl4-openssl-dev
          # 安装 Windows 交叉编译工具 (MinGW)
          sudo apt-get install -y mingw-w64
          # 安装 Linux ARM 32位 交叉编译工具链
          sudo apt-get install -y binutils-arm-linux-gnueabihf gcc-arm-linux-gnueabihf
          # 安装 Linux ARM 64位 交叉编译工具链
          sudo apt-get install -y binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu
          # 安装多架构binutils支持
          sudo apt-get install -y binutils-multiarch
          
          # 为ARM32交叉编译创建软链接，解决FPC找不到arm-linux-ld的问题
          sudo ln -sf /usr/bin/arm-linux-gnueabihf-ld /usr/bin/arm-linux-ld
          sudo ln -sf /usr/bin/arm-linux-gnueabihf-as /usr/bin/arm-linux-as
          sudo ln -sf /usr/bin/arm-linux-gnueabihf-ar /usr/bin/arm-linux-ar
          sudo ln -sf /usr/bin/arm-linux-gnueabihf-strip /usr/bin/arm-linux-strip
          
          # 为ARM64交叉编译创建软链接，解决FPC找不到aarch64-linux-ld的问题
          sudo ln -sf /usr/bin/aarch64-linux-gnu-ld /usr/bin/aarch64-linux-ld
          sudo ln -sf /usr/bin/aarch64-linux-gnu-as /usr/bin/aarch64-linux-as
          sudo ln -sf /usr/bin/aarch64-linux-gnu-ar /usr/bin/aarch64-linux-ar
          sudo ln -sf /usr/bin/aarch64-linux-gnu-strip /usr/bin/aarch64-linux-strip
      - name: 配置 FPC 交叉编译器
        run: |
          # 获取当前FPC版本
          FPC_VER=$(fpc -iV)
          cd /usr/share/fpcsrc/$FPC_VER
          
          # Windows 64位交叉编译器
          sudo make crossinstall CPU_TARGET=x86_64 OS_TARGET=win64 INSTALL_PREFIX=/usr
          sudo ln -sf /usr/lib/fpc/$FPC_VER/ppcrossx64 /usr/bin/ppcrossx64
          
          # Windows 32位交叉编译器
          sudo make crossinstall CPU_TARGET=i386 OS_TARGET=win32 INSTALL_PREFIX=/usr
          sudo ln -sf /usr/lib/fpc/$FPC_VER/ppcross386 /usr/bin/ppcross386
          
          # Linux ARM 32位交叉编译器
          sudo make crossinstall CPU_TARGET=arm OS_TARGET=linux INSTALL_PREFIX=/usr BINUTILSPREFIX=arm-linux-gnueabihf-
          sudo ln -sf /usr/lib/fpc/$FPC_VER/ppcrossarm /usr/bin/ppcrossarm
          
          # Linux ARM 64位交叉编译器
          sudo make crossinstall CPU_TARGET=aarch64 OS_TARGET=linux INSTALL_PREFIX=/usr BINUTILSPREFIX=aarch64-linux-gnu-
          sudo ln -sf /usr/lib/fpc/$FPC_VER/ppcrossa64 /usr/bin/ppcrossa64
      - name: 配置依赖路径
        run: |
          # 依赖已经包含在主仓库中，直接配置路径即可
          echo "PPC_CONFIG_PATH=$GITHUB_WORKSPACE/deps" >> $GITHUB_ENV
      - name: 执行多平台交叉编译
        run: |
          # 创建输出目录
          mkdir -p \
            output/linux_x64 \
            output/linux_arm \
            output/linux_arm64 \
            output/win_x64 \
            output/win_x86
          
          # 编译 Linux x86_64
          echo "--- 编译 Linux x86_64 ---"
          lazbuild --cpu=x86_64 --os=linux src/pascalcoin_daemon.lpi
          lazbuild --cpu=x86_64 --os=linux src/pascalcoin_wallet_classic.lpi
          cp src/pascalcoin_daemon output/linux_x64/
          cp src/PascalCoinWalletLazarus output/linux_x64/
          
          # 编译 Windows x86_64
          echo "--- 编译 Windows x86_64 ---"
          lazbuild --cpu=x86_64 --os=win64 src/pascalcoin_daemon.lpi
          lazbuild --cpu=x86_64 --os=win64 src/pascalcoin_wallet_classic.lpi
          cp src/pascalcoin_daemon.exe output/win_x64/
          cp src/PascalCoinWalletLazarus.exe output/win_x64/
          
          # 编译 Windows i386
          echo "--- 编译 Windows i386 ---"
          lazbuild --cpu=i386 --os=win32 src/pascalcoin_daemon.lpi
          lazbuild --cpu=i386 --os=win32 src/pascalcoin_wallet_classic.lpi
          cp src/pascalcoin_daemon.exe output/win_x86/
          cp src/PascalCoinWalletLazarus.exe output/win_x86/
          
          # 编译 Linux ARM 32位
          echo "--- 编译 Linux ARM 32位 ---"
          lazbuild --cpu=arm --os=linux --options="-Xr/usr/arm-linux-gnueabihf" src/pascalcoin_daemon.lpi
          lazbuild --cpu=arm --os=linux --options="-Xr/usr/arm-linux-gnueabihf" src/pascalcoin_wallet_classic.lpi
          cp src/pascalcoin_daemon output/linux_arm/
          cp src/PascalCoinWalletLazarus output/linux_arm/
          
          # 编译 Linux ARM 64位
          echo "--- 编译 Linux ARM 64位 ---"
          lazbuild --cpu=aarch64 --os=linux --options="-Xr/usr/aarch64-linux-gnu" src/pascalcoin_daemon.lpi
          lazbuild --cpu=aarch64 --os=linux --options="-Xr/usr/aarch64-linux-gnu" src/pascalcoin_wallet_classic.lpi
          cp src/pascalcoin_daemon output/linux_arm64/
          cp src/PascalCoinWalletLazarus output/linux_arm64/
      - name: 打包所有平台产物
        run: |
          cd output
          zip -r ../pasbox-all-platforms.zip .
          cd ..
      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: pasbox-unified-build
          path: pasbox-all-platforms.zip
      - name: 构建编译环境Docker镜像
        run: |
          # 创建Dockerfile，打包整个编译环境（使用printf避免here-doc的缩进语法问题）
          printf '%s\n' \
          "FROM ubuntu:latest" \
          "ENV DEBIAN_FRONTEND=noninteractive" \
          "# 安装内核和启动工具，用于虚拟机镜像" \
          "RUN apt-get update && apt-get install -y linux-image-generic grub2" \
          "# 安装所有系统依赖" \
          "RUN apt-get install -y libgtk2.0-dev libssl-dev libcurl4-openssl-dev mingw-w64 binutils-arm-linux-gnueabihf gcc-arm-linux-gnueabihf libc6-dev-armhf-cross binutils-aarch64-linux-gnu gcc-aarch64-linux-gnu libc6-dev-arm64-cross binutils-multiarch" \
          "# 创建交叉编译工具软链接" \
          "RUN ln -sf /usr/bin/arm-linux-gnueabihf-ld /usr/bin/arm-linux-ld && ln -sf /usr/bin/arm-linux-gnueabihf-as /usr/bin/arm-linux-as && ln -sf /usr/bin/arm-linux-gnueabihf-ar /usr/bin/arm-linux-ar && ln -sf /usr/bin/arm-linux-gnueabihf-strip /usr/bin/arm-linux-strip" \
          "RUN ln -sf /usr/bin/aarch64-linux-gnu-ld /usr/bin/aarch64-linux-ld && ln -sf /usr/bin/aarch64-linux-gnu-as /usr/bin/aarch64-linux-as && ln -sf /usr/bin/aarch64-linux-gnu-ar /usr/bin/aarch64-linux-ar && ln -sf /usr/bin/aarch64-linux-gnu-strip /usr/bin/aarch64-linux-strip" \
          "# 安装Lazarus和FPC" \
          "RUN apt-get install -y wget && wget https://github.com/gcarreno/setup-lazarus/releases/download/v3.2.17/lazarus_3.2.17_amd64.deb && dpkg -i lazarus_3.2.17_amd64.deb && rm lazarus_3.2.17_amd64.deb" \
          "# 配置FPC交叉编译器" \
          "RUN FPC_VER=\$(fpc -iV) && cd /usr/share/fpcsrc/\$FPC_VER && make crossinstall CPU_TARGET=x86_64 OS_TARGET=win64 INSTALL_PREFIX=/usr && ln -sf /usr/lib/fpc/\$FPC_VER/ppcrossx64 /usr/bin/ppcrossx64" \
          "RUN FPC_VER=\$(fpc -iV) && cd /usr/share/fpcsrc/\$FPC_VER && make crossinstall CPU_TARGET=i386 OS_TARGET=win32 INSTALL_PREFIX=/usr && ln -sf /usr/lib/fpc/\$FPC_VER/ppcross386 /usr/bin/ppcross386" \
          "RUN FPC_VER=\$(fpc -iV) && cd /usr/share/fpcsrc/\$FPC_VER && make crossinstall CPU_TARGET=arm OS_TARGET=linux INSTALL_PREFIX=/usr BINUTILSPREFIX=arm-linux-gnueabihf- && ln -sf /usr/lib/fpc/\$FPC_VER/ppcrossarm /usr/bin/ppcrossarm" \
          "RUN FPC_VER=\$(fpc -iV) && cd /usr/share/fpcsrc/\$FPC_VER && make crossinstall CPU_TARGET=aarch64 OS_TARGET=linux INSTALL_PREFIX=/usr BINUTILSPREFIX=aarch64-linux-gnu- && ln -sf /usr/lib/fpc/\$FPC_VER/ppcrossa64 /usr/bin/ppcrossa64" \
          "# 配置环境变量" \
          "ENV FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" \
          "ENV PPC_CONFIG_PATH=/workspace/deps" \
          "WORKDIR /workspace" \
          > Dockerfile
          
          # 配置Docker禁用IPv6，解决GitHub Actions的IPv6网络不可达问题
          echo '{ "ipv6": false }' | sudo tee /etc/docker/daemon.json
          sudo systemctl restart docker
          sleep 5
          
          # 构建Docker镜像
          docker build --network=host -t pasbox-build-env:latest .
          # 打包Docker镜像为tar.gz文件，方便下载
          docker save pasbox-build-env:latest | gzip > pasbox-build-env.tar.gz
          
          # 安装docker2vm工具，将Docker镜像转换为虚拟机格式
          wget https://github.com/medya/d2v/releases/latest/download/d2v-linux-amd64 -O d2v
          chmod +x d2v
          
          # 生成VirtualBox格式镜像 (.vdi)
          ./d2v --input pasbox-build-env:latest --output pasbox-build-env.vdi --format virtualbox
          # 生成VMware格式镜像 (.vmdk)
          ./d2v --input pasbox-build-env:latest --output pasbox-build-env.vmdk --format vmware
          # 生成通用OVA格式镜像 (支持所有主流虚拟机软件)
          ./d2v --input pasbox-build-env:latest --output pasbox-build-env.ova --format ova
          
          # 压缩虚拟机镜像，减小下载体积
          gzip pasbox-build-env.vdi
          gzip pasbox-build-env.vmdk
      - name: 上传所有环境镜像
        uses: actions/upload-artifact@v4
        with:
          name: pasbox-build-env
          path: |
            pasbox-build-env.tar.gz
            pasbox-build-env.vdi.gz
            pasbox-build-env.vmdk.gz
            pasbox-build-env.ova
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: 下载编译产物
        uses: actions/download-artifact@v4
        with:
          name: pasbox-unified-build
      - name: 下载环境镜像
        uses: actions/download-artifact@v4
        with:
          name: pasbox-build-env
      - name: 创建 GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            pasbox-all-platforms.zip
            pasbox-build-env.tar.gz
            pasbox-build-env.vdi.gz
            pasbox-build-env.vmdk.gz
            pasbox-build-env.ova
          body: |
            Pasbox 统一交叉编译版本 ${{ github.ref_name }}
            构建环境: Ubuntu Latest (单一系统交叉编译)
            包含平台: Linux x64, Linux ARM 32位, Linux ARM 64位, Windows x64, Windows x86
            
            本版本由GitHub Actions全自动编译发布，无需人工干预。
            同时提供预配置的编译环境，支持多种格式：
            - `pasbox-build-env.tar.gz`: Docker容器镜像，轻量快速，支持全平台
            - `pasbox-build-env.vdi.gz`: VirtualBox虚拟机磁盘镜像
            - `pasbox-build-env.vmdk.gz`: VMware虚拟机磁盘镜像
            - `pasbox-build-env.ova`: 通用OVA虚拟机镜像，支持所有主流虚拟机软件
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
